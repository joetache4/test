<!DOCTYPE html>
<html lang = "en">
	<head>
		<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
		
		<title>{% if page.play %}{{ page.play }}, {{ page.title }}{% else %}{{ page.title }}{% endif %}</title>
		<meta name="apple-mobile-web-app-title" content="{% if page.play %}{{ page.play }}, {{ page.title }}{% else %}{{ page.title }}{% endif %}">
		
		<link rel = "stylesheet" href = "{{ site.baseurl }}/css/main.css" />
		<meta name = "viewport" content = "width=device-width, initial-scale=1" />
		
		<link rel = "shortcut icon" sizes = "200x200" type = "image/png" href = "{{ site.baseurl }}/img/icon_200x200.png" />
		<link rel = "shortcut icon" type = "image/x-icon" href = "{{ site.baseurl }}/img/favicon.ico" />
		
		<link id="icon60" rel="apple-touch-icon" href="{{ site.baseurl }}/img/icon_60x60.png?v=2"/>
		<link id="icon76" rel="apple-touch-icon" sizes="76x76" href="{{ site.baseurl }}/img/icon_76x76.png?v=2"/>
		<link id="icon120" rel="apple-touch-icon" sizes="120x120" href="{{ site.baseurl }}/img/icon_120x120.png?v=2"/>
		<link id="icon152" rel="apple-touch-icon" sizes="152x152" href="{{ site.baseurl }}/img/icon_152x152.png?v=2"/>
		<link rel="image_src" href="{{ site.baseurl }}/img/icon_256x256.png"/>
		
		<meta name="HandheldFriendly" content="true" />
		<meta name="apple-mobile-web-app-capable" content="no" />	
		
		<meta name="robots" content="noindex,nofollow,disallow">	
		<meta name="referrer" content="none">	
	</head>
	<body>
		{{ content }}
	</body>
</html>
